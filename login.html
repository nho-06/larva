<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Đăng nhập hệ thống quản lý và bán hàng Larva"
    >

    <title>Larva | Đăng nhập</title>

    <link
        rel="preconnect"
        href="https://www.gstatic.com"
        crossorigin
    >

    <link
        rel="stylesheet"
        href="./assets/css/main.css?v=52"
    >

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        /*
            Trong lúc auth-guard đang kiểm tra Firebase,
            tạm ẩn trang để tránh giao diện chớp hoặc
            hiện trang đăng nhập trước khi chuyển hướng.
        */
        html:not(.auth-ready) body {
            visibility: hidden;
        }

        body {
            min-height: 100vh;
            font-family:
                Arial,
                Helvetica,
                sans-serif;
            background:
                linear-gradient(
                    135deg,
                    #fff7fa,
                    #fbdce8
                );
            color: #60444f;
        }

        button,
        input {
            font: inherit;
        }

        button {
            -webkit-tap-highlight-color:
                transparent;
        }

        .login-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login-card {
            width: min(
                430px,
                100%
            );
            padding: 34px;
            border: 1px solid #f0d8e2;
            border-radius: 24px;
            background:
                rgba(
                    255,
                    255,
                    255,
                    0.96
                );
            box-shadow:
                0 24px 60px
                rgba(
                    166,
                    91,
                    122,
                    0.16
                );
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .login-brand img {
            width: 58px;
            height: 58px;
            object-fit: contain;
            padding: 7px;
            border-radius: 16px;
            background: #fff4f8;
        }

        .login-brand strong {
            color: #bd6088;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .login-heading {
            margin-bottom: 24px;
            text-align: center;
        }

        .login-heading h1 {
            margin: 0 0 8px;
            color: #60444f;
            font-size: 28px;
        }

        .login-heading p {
            margin: 0;
            color: #9c7785;
            line-height: 1.5;
        }

        .login-form {
            display: grid;
            gap: 17px;
        }

        .login-label {
            display: grid;
            gap: 8px;
            color: #72535f;
            font-weight: 700;
        }

        .required-mark {
            color: #cf557f;
        }

        .login-input {
            width: 100%;
            min-height: 48px;
            padding: 0 14px;
            border: 1px solid #ead1dc;
            border-radius: 12px;
            background: #ffffff;
            color: #513b43;
            font-size: 16px;
            outline: none;
            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease,
                background 0.2s ease;
        }

        .login-input::placeholder {
            color: #b49aa4;
        }

        .login-input:hover:not(:disabled) {
            border-color: #dda2bc;
        }

        .login-input:focus {
            border-color: #d68bad;
            box-shadow:
                0 0 0 4px
                rgba(
                    214,
                    139,
                    173,
                    0.14
                );
        }

        .login-input:disabled {
            background: #f8f3f5;
            cursor: not-allowed;
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap .login-input {
            padding-right: 82px;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            min-width: 54px;
            min-height: 34px;
            padding: 0 8px;
            transform:
                translateY(-50%);
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #b25f83;
            font-weight: 700;
            cursor: pointer;
        }

        .toggle-password:hover {
            background: #fff3f7;
        }

        .toggle-password:focus-visible {
            outline: 2px solid #d987ad;
            outline-offset: 2px;
        }

        .toggle-password:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-button {
            width: 100%;
            min-height: 50px;
            margin-top: 4px;
            padding: 0 18px;
            border: 0;
            border-radius: 13px;
            background: #d987ad;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition:
                opacity 0.2s ease,
                transform 0.2s ease,
                box-shadow 0.2s ease;
        }

        .login-button:hover:not(:disabled) {
            transform:
                translateY(-1px);
            box-shadow:
                0 10px 24px
                rgba(
                    196,
                    100,
                    142,
                    0.24
                );
        }

        .login-button:active:not(:disabled) {
            transform:
                translateY(0);
        }

        .login-button:focus-visible {
            outline: 3px solid
                rgba(
                    217,
                    135,
                    173,
                    0.35
                );
            outline-offset: 3px;
        }

        .login-button:disabled,
        .login-button.is-loading {
            opacity: 0.65;
            cursor: wait;
            transform: none;
            box-shadow: none;
        }

        .login-error {
            margin: 0;
            padding: 11px 13px;
            border: 1px solid #f0b9c7;
            border-radius: 11px;
            background: #fff1f4;
            color: #b44260;
            font-size: 14px;
            line-height: 1.5;
        }

        .login-register {
            margin-top: 18px;
            text-align: center;
        }

        .login-register p {
            margin: 0 0 8px;
            color: #9a7784;
            font-size: 14px;
        }

        .login-register a {
            color: #b6537d;
            font-weight: 700;
            text-decoration: none;
        }

        .login-register a:hover {
            text-decoration: underline;
        }

        .login-register a:focus-visible {
            outline: 2px solid #d987ad;
            outline-offset: 4px;
            border-radius: 3px;
        }

        .login-note {
            margin: 22px 0 0;
            padding-top: 18px;
            border-top: 1px solid #f1dce4;
            color: #9a7784;
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 520px) {
            .login-page {
                padding: 14px;
            }

            .login-card {
                padding: 26px 20px;
                border-radius: 19px;
            }

            .login-brand {
                margin-bottom: 22px;
            }

            .login-brand img {
                width: 52px;
                height: 52px;
            }

            .login-brand strong {
                font-size: 25px;
            }

            .login-heading h1 {
                font-size: 24px;
            }

            .login-input {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <main class="login-page">

        <section
            class="login-card"
            aria-labelledby="loginTitle"
        >

            <div class="login-brand">

                <img
                    src="./assets/images/larva-mascot.png"
                    alt="Logo Larva"
                >

                <strong>
                    LARVA
                </strong>

            </div>

            <div class="login-heading">

                <h1 id="loginTitle">
                    Đăng nhập
                </h1>

                <p>
                    Nhập tài khoản để tiếp tục sử dụng hệ thống.
                </p>

            </div>

            <form
                id="loginForm"
                class="login-form"
                novalidate
            >

                <label
                    class="login-label"
                    for="usernameInput"
                >

                    <span>
                        Tên đăng nhập hoặc email

                        <span
                            class="required-mark"
                            aria-hidden="true"
                        >
                            *
                        </span>
                    </span>

                    <input
                        id="usernameInput"
                        class="login-input"
                        type="text"
                        name="username"
                        autocomplete="username"
                        autocapitalize="none"
                        autocorrect="off"
                        spellcheck="false"
                        inputmode="email"
                        maxlength="150"
                        placeholder="Nhập username hoặc email"
                        required
                    >

                </label>

                <label
                    class="login-label"
                    for="passwordInput"
                >

                    <span>
                        Mật khẩu

                        <span
                            class="required-mark"
                            aria-hidden="true"
                        >
                            *
                        </span>
                    </span>

                    <div class="password-wrap">

                        <input
                            id="passwordInput"
                            class="login-input"
                            type="password"
                            name="password"
                            autocomplete="current-password"
                            minlength="6"
                            maxlength="128"
                            placeholder="Nhập mật khẩu"
                            required
                        >

                        <button
                            id="togglePasswordButton"
                            class="toggle-password"
                            type="button"
                            aria-label="Hiện mật khẩu"
                            aria-controls="passwordInput"
                            aria-pressed="false"
                        >
                            Hiện
                        </button>

                    </div>

                </label>

                <p
                    id="loginError"
                    class="login-error hidden"
                    role="alert"
                    aria-live="assertive"
                    hidden
                ></p>

                <button
                    id="loginButton"
                    class="login-button"
                    type="submit"
                >
                    Đăng nhập
                </button>

            </form>

            <div class="login-register">

                <p>
                    Chưa có tài khoản nhân viên?
                </p>

                <a href="./register.html">
                    Đăng ký nhân viên
                </a>

            </div>

            <p class="login-note">
                Tài khoản nhân viên mới phải được admin xác nhận trước khi đăng nhập.
            </p>

        </section>

    </main>

    <!--
        Auth guard phải chạy trước login.js.

        File này:
        - Kiểm tra người dùng đã đăng nhập chưa.
        - Nếu đã đăng nhập thì chuyển đến trang đúng quyền.
        - Nếu chưa đăng nhập thì mở trang login.
    -->
    <script
        type="module"
        src="./assets/js/auth/auth-guard.js?v=52"
    ></script>

    <script
        type="module"
        src="./assets/js/pages/login.js?v=52"
    ></script>

</body>

</html>
