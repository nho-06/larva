<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Larva | Đăng nhập</title>

    <link
        rel="preconnect"
        href="https://www.gstatic.com"
        crossorigin
    >

    <link
        rel="stylesheet"
        href="./assets/css/main.css"
    >

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family:
                Arial,
                Helvetica,
                sans-serif;
            background:
                linear-gradient(
                    135deg,
                    #fff7fa,
                    #fbdce8
                );
            color: #60444f;
        }

        .login-page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .login-card {
            width: min(
                430px,
                100%
            );
            padding: 34px;
            border: 1px solid #f0d8e2;
            border-radius: 24px;
            background: rgba(
                255,
                255,
                255,
                0.95
            );
            box-shadow:
                0 24px 60px
                rgba(
                    166,
                    91,
                    122,
                    0.16
                );
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .login-brand img {
            width: 58px;
            height: 58px;
            object-fit: contain;
            padding: 7px;
            border-radius: 16px;
            background: #fff4f8;
        }

        .login-brand strong {
            font-size: 28px;
            letter-spacing: 2px;
            color: #bd6088;
        }

        .login-heading {
            margin-bottom: 24px;
            text-align: center;
        }

        .login-heading h1 {
            margin: 0 0 8px;
            font-size: 28px;
            color: #60444f;
        }

        .login-heading p {
            margin: 0;
            color: #9c7785;
            line-height: 1.5;
        }

        .login-form {
            display: grid;
            gap: 17px;
        }

        .login-form label {
            display: grid;
            gap: 8px;
            font-weight: 700;
            color: #72535f;
        }

        .login-input {
            width: 100%;
            min-height: 48px;
            padding: 0 14px;
            border: 1px solid #ead1dc;
            border-radius: 12px;
            background: #ffffff;
            color: #513b43;
            font-size: 16px;
            outline: none;
            transition:
                border-color 0.2s ease,
                box-shadow 0.2s ease;
        }

        .login-input:focus {
            border-color: #d68bad;
            box-shadow:
                0 0 0 4px
                rgba(
                    214,
                    139,
                    173,
                    0.14
                );
        }

        .password-wrap {
            position: relative;
        }

        .password-wrap .login-input {
            padding-right: 90px;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            border: 0;
            background: transparent;
            color: #b25f83;
            font-weight: 700;
            cursor: pointer;
        }

        .login-button {
            width: 100%;
            min-height: 50px;
            margin-top: 4px;
            border: 0;
            border-radius: 13px;
            background: #d987ad;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition:
                transform 0.2s ease,
                opacity 0.2s ease;
        }

        .login-button:hover {
            transform: translateY(-1px);
        }

        .login-button:disabled {
            opacity: 0.65;
            cursor: wait;
            transform: none;
        }

        .login-error {
            margin: 0;
            padding: 11px 13px;
            border: 1px solid #f0b9c7;
            border-radius: 11px;
            background: #fff1f4;
            color: #b44260;
            font-size: 14px;
            line-height: 1.5;
        }

        .hidden {
            display: none !important;
        }

        .login-note {
            margin: 22px 0 0;
            padding-top: 18px;
            border-top: 1px solid #f1dce4;
            color: #9a7784;
            font-size: 13px;
            line-height: 1.6;
            text-align: center;
        }

        .login-register {
    margin-top: 18px;
    text-align: center;
        }

        .login-register p {
            margin: 0 0 8px;
            color: #9a7784;
            font-size: 14px;
        }

        .login-register a {
            color: #b6537d;
            font-weight: 700;
            text-decoration: none;
        }

        .login-register a:hover {
            text-decoration: underline;
        }

        @media (max-width: 520px) {
            .login-page {
                padding: 14px;
            }

            .login-card {
                padding: 26px 20px;
                border-radius: 19px;
            }

            .login-heading h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

<main class="login-page">

    <section class="login-card">

        <div class="login-brand">

            <img
                src="./assets/images/larva-mascot.png"
                alt="Larva"
            >

            <strong>
                LARVA
            </strong>

        </div>

        <div class="login-heading">

            <h1>
                Đăng nhập
            </h1>


        </div>

        <form
            id="loginForm"
            class="login-form"
        >

            <label>

                Tên đăng nhập

                <input
                    id="usernameInput"
                    class="login-input"
                    type="text"
                    autocomplete="username"
                    placeholder="Ví dụ: admin"
                    required
                >

            </label>

            <label>

                Mật khẩu

                <div class="password-wrap">

                    <input
                        id="passwordInput"
                        class="login-input"
                        type="password"
                        autocomplete="current-password"
                        placeholder="Nhập mật khẩu"
                        required
                    >

                    <button
                        id="togglePasswordButton"
                        class="toggle-password"
                        type="button"
                    >
                        Hiện
                    </button>

                </div>

            </label>

            <p
                id="loginError"
                class="login-error hidden"
            ></p>

            <button
                id="loginButton"
                class="login-button"
                type="submit"
            >
                Đăng nhập
            </button>

        </form>

<div class="login-register">

    <p>
        Chưa có tài khoản nhân viên?
    </p>

    <a href="./register.html">
        Đăng ký nhân viên
    </a>

</div>

    </section>

</main>

<script
    type="module"
    src="./assets/js/pages/login.js"
></script>

</body>

</html>
